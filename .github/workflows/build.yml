name: Build

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set build label
        id: label
        shell: bash
        run: |
          SAFE_NAME="${{ github.ref_name }}"
          SAFE_NAME="${SAFE_NAME//\//-}"
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "suffix=" >> $GITHUB_OUTPUT
          else
            echo "suffix=-${SAFE_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: pip install -e . pyinstaller

      - name: Run tests
        run: pip install -e ".[dev]" && python -m pytest tests/ --tb=short

      - name: Install macOS extras
        if: runner.os == 'macOS'
        run: pip install pyobjc-framework-Cocoa pillow

      - name: Convert icon to icns (macOS)
        if: runner.os == 'macOS'
        run: |
          python -c "from PIL import Image; Image.open('src/klo_chords/assets/icons/app_icon.ico').save('app_icon_tmp.png')"
          sips -s format icns app_icon_tmp.png --out app_icon.icns

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller --windowed --name "KLO Chords${{ steps.label.outputs.suffix }}" --paths src --collect-all dearpygui --icon app_icon.icns --add-data "src/klo_chords/assets/fonts/NotoSans-Regular.ttf:klo_chords/assets/fonts" --add-data "src/klo_chords/assets/fonts/JetBrainsMono-Regular.ttf:klo_chords/assets/fonts" --add-data "src/klo_chords/assets/chords/guitar_standard.json:klo_chords/assets/chords" src/klo_chords/gui.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --windowed --onefile --name "KLO Chords${{ steps.label.outputs.suffix }}" --paths src --collect-all dearpygui --icon src/klo_chords/assets/icons/app_icon.ico --add-data "src/klo_chords/assets/fonts/NotoSans-Regular.ttf;klo_chords/assets/fonts" --add-data "src/klo_chords/assets/fonts/JetBrainsMono-Regular.ttf;klo_chords/assets/fonts" --add-data "src/klo_chords/assets/chords/guitar_standard.json;klo_chords/assets/chords" src/klo_chords/gui.py

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: KLO-Chords-macOS${{ steps.label.outputs.suffix }}
          path: dist/

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: KLO-Chords-Windows${{ steps.label.outputs.suffix }}
          path: "dist/KLO Chords${{ steps.label.outputs.suffix }}.exe"