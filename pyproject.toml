[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "klo-chord-sample"
version = "0.1.0"
description = "Chord theory tool - displays diatonic chords and guitar tabs for any key."
requires-python = ">=3.11"
dependencies = ["dearpygui"]

[project.scripts]
klo-chord-sample = "klo_chord_sample.gui:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
klo_chord_sample = ["assets/fonts/*.ttf"]
